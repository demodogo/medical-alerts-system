<div class="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center space-x-3">
          <div
            class="flex items-center justify-center w-10 h-10 rounded-xl bg-indigo-600 text-white shadow-md shadow-indigo-200"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
              />
            </svg>
          </div>
          <div>
            <h1 class="text-lg font-bold text-slate-900 tracking-tight">Alertas Médicas</h1>
            <p class="text-xs text-slate-500">Identidad Segura y Monitoreo de Pacientes</p>
          </div>
        </div>

        <div class="flex items-center space-x-4">
          <div
            *ngIf="account"
            class="hidden md:flex items-center space-x-2 bg-slate-100/80 px-3 py-1.5 rounded-lg border border-slate-200/50"
          >
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-xs font-medium text-slate-600">B2C Session:</span>
            <span class="text-xs font-semibold text-slate-800">{{ userDisplayName }}</span>
          </div>

          <div class="flex items-center space-x-2">
            <button
              *ngIf="!account"
              type="button"
              (click)="login()"
              class="px-3.5 py-2 text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 rounded-lg shadow-sm transition-all duration-200 cursor-pointer"
            >
              Iniciar Sesión
            </button>
            <button
              *ngIf="account"
              type="button"
              (click)="logout()"
              class="px-3.5 py-2 text-xs font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 rounded-lg transition-all duration-200 cursor-pointer"
            >
              Cerrar Sesión
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 flex-1 py-8 flex flex-col space-y-6">
    <nav
      class="flex space-x-2 p-1.5 bg-slate-200/60 rounded-xl max-w-md self-start border border-slate-200/30"
    >
      <a
        routerLink="/"
        routerLinkActive="bg-white text-indigo-700 shadow-sm"
        [routerLinkActiveOptions]="{ exact: true }"
        class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-600 hover:text-slate-900 transition-all duration-200"
      >
        Inicio
      </a>
      <a
        routerLink="/patients"
        routerLinkActive="bg-white text-indigo-700 shadow-sm"
        class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-600 hover:text-slate-900 transition-all duration-200"
      >
        Pacientes
      </a>
      <a
        routerLink="/vital-signs"
        routerLinkActive="bg-white text-indigo-700 shadow-sm"
        class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-600 hover:text-slate-900 transition-all duration-200"
      >
        Signos Vitales
      </a>
      <a
        routerLink="/alerts"
        routerLinkActive="bg-white text-indigo-700 shadow-sm"
        class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-600 hover:text-slate-900 transition-all duration-200"
      >
        Alertas
      </a>
    </nav>

    <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 md:p-8">
      <div *ngIf="!isInitialized" class="flex flex-col items-center justify-center py-12 space-y-4">
        <div
          class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"
        ></div>
        <p class="text-xs text-slate-500 font-semibold">Cargando sesión y configuraciones...</p>
      </div>
      <router-outlet *ngIf="isInitialized"></router-outlet>
    </div>
  </div>
</div>

spring.application.name=summary-producer-ms
server.port=${SERVER_PORT:8092}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:medical_user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:medical_pass}

rabbitmq.exchange.summaries=medical.summaries.exchange
rabbitmq.routing-key.summaries=medical.summaries.created
rabbitmq.queue.summaries=medical.summaries.queue

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.application.name=alert-oracle-consumer-ms
server.port=${SERVER_PORT:8093}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:medical_user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:medical_pass}

rabbitmq.queue.alerts.oracle=medical.alerts.oracle.queue

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
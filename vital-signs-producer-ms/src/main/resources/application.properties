spring.application.name=vital-signs-producer

server.port=${SERVER_PORT:8091}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:medical_user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:medical_pass}

rabbitmq.exchange.alerts=medical.alerts.exchange
rabbitmq.routing-key.alerts=medical.alerts.detected
rabbitmq.queue.alerts.oracle=medical.alerts.oracle.queue
rabbitmq.queue.alerts.file=medical.alerts.file.queue

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.application.name=alert-file-consumer-ms
server.port=${SERVER_PORT:8094}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:medical_user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:medical_pass}

rabbitmq.queue.alerts.file=medical.alerts.file.queue

alerts.files.output-dir=${ALERT_FILES_OUTPUT_DIR:generated-alerts}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always